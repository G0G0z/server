# Locations where rtp will center upon
# Format:
# - LOCATION_NAME:
#     World: world
#     CenterX: 100
#     CenterY: 150
#     MaxRadius: 100
#     MinRadius: 5
#     Shape: square
#     MinY: 0
#     MaxY: 320

Enabled: true # enable the locations feature
RequirePermission: false # Require players to have `betterrtp.location.<world_name>`
UseLocationIfAvailable: false # Will choose a location upon `/rtp` if location(s) is available in the world
UseLocationsInSameWorld: false # Will only choose locations in same world rtp'ing in

