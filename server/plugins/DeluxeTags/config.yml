# DeluxeTags version: 1.8.2-Release Main Configuration
#
# Create your tags using the following format:
#
# deluxetags:
#   VIP: 
#     order: 1
#     tag: '&7[&eVIP&7]'
#     description: 'This tag is awarded by getting VIP'
#
# Placeholders for your chat plugin that supports PlaceholderAPI (Including DeluxeChat)
#
# %deluxetags_identifier% - display the players active tag identifier
# %deluxetags_tag% - display the players active tag
# %deluxetags_description% - display the players active tag description
# %deluxetags_amount% - display the amount of tags a player has access to
#
# Placeholders for your essentials/chat handling formats config:
#
# {deluxetags_identifier} - display the players active tag identifier
# {deluxetags_tag} - display the players active tag
# {deluxetags_description} - display the players active tag description
# {deluxetags_amount} - display the amount of tags a player has access to

force_tags: false
check_updates: true
legacy_hex: false
papi_chat: true
format_chat:
  enabled: false
  format: '{deluxetags_tag} <%1$s> %2$s'
load_tag_on_join: true
gui:
  name: '&8Available tags: %deluxetags_amount%'
  tag_select_item:
    material: NAME_TAG
    data: 0
    displayname: '&e%deluxetags_identifier% Pin'
    lore:
    - ''
    - '&fDisplay: %deluxetags_tag%'
    - '&7Display in chat and tab'
    - ''
    - '&e➥ Left-Click to select'
  divider_item:
    material: BLACK_STAINED_GLASS_PANE
    data: 0
    displayname: '&f'
    lore: []
  has_tag_item:
    material: PLAYER_HEAD
    data: 0
    displayname: '&eYour Tag'
    lore:
    - ''
    - '&fCurrent: %deluxetags_identifier%'
    - '&fDisplay: %deluxetags_tag%'
    - ''
    - '&e➥ Left-Click to remove tag'
  no_tag_item:
    material: PLAYER_HEAD
    data: 0
    displayname: '&cYou don''t have a tag set!'
    lore:
    - ''
    - '&eSelect a tag from the menu!'
  exit_item:
    material: IRON_DOOR
    data: 0
    displayname: '&c&lᴇxɪᴛ'
    lore: []
  next_page:
    material: PAPER
    data: 0
    displayname: '&f&lɴᴇxᴛ'
    lore: []
  previous_page:
    material: PAPER
    data: 0
    displayname: '&f&lᴘʀᴇᴠɪᴏᴜs'
    lore: []
