# Support: https://discord.gg/badbones-s-live-chat-182615261403283459
# Github: https://github.com/Crazy-Crew
# 
# Issues: https://github.com/Crazy-Crew/CrazyVouchers/issues
# Features: https://github.com/Crazy-Crew/CrazyVouchers/issues
# 
# Tips:
#  1. Make sure to use the {prefix} to add the prefix in front of messages.
#  2. If you wish to use more than one line for a message just go from a line to a list.
# Examples:
#   Line:
#     No-Permission: '{prefix}<red>You do not have permission to use that command.'
#   List:
#     No-Permission:
#       - '{prefix}<red>You do not have permission'
#       - '<red>to use that command. Please try another.'
player:
  survival-only: '{prefix}<red>You must be in survival mode to use vouchers.'
  # A list of available placeholders: {permission}
  no-permission: '{prefix}<red>You do not have permission to use that command!'
  voucher:
    no-permission: '{prefix}<red>You do not have permission to use that voucher.'
    already-used:
      value: '{prefix}<red>This voucher has already been used, likely a duped voucher'
      # This requires the permission crazyvouchers.notify.duped
      # 
      # Available placeholders: {player}, {id}
      notify-staff: '{prefix}{player} has been potentially caught using a duped voucher
        with the id {id}.'
    no-permission-offhand: '{prefix}<red>You do not have permission to use vouchers
      in your off hand.'
    cant-put-in-crafting-table: '{prefix}<red>You cannot put vouchers in the crafting
      table.'
    migrated: '{prefix}<red>Successfully migrated old vouchers in your inventory.'
  # A list of available placeholders: {player}
  target-not-online: '{prefix}<red>That player is not online.'
  hit-limit: '{prefix}<red>You have hit your limit for using this voucher.'
  two-step-authentication: '{prefix}<gray>Right click again to confirm that you want
    to use this voucher.'
voucher:
  requirements:
    not-a-number: '{prefix}<red>{arg} is not a number.'
    not-a-voucher: '{prefix}<red>That is not a Voucher Type.'
    un-stack-item: '{prefix}<red>Sorry but you can not use this voucher because you
      have a black-listed permission.'
    not-in-world: '{prefix}<red>You can not use that voucher here as you are not in
      a whitelisted world for this voucher.'
    has-blacklist-perm: '{prefix}<red>You need to unstack that item before you can
      use it.'
  code:
    unavailable: '{prefix}<red>The Voucher code <gold>{arg} <red>is incorrect or unavailable
      at this time.'
    used: '{prefix}<red>The voucher code <gold>{arg} <red>has already been redeemed.'
  sent-voucher: '{prefix}<aqua>You have just given <gold>{player} <aqua>a <gold>{voucher}
    <aqua>voucher.'
  # A list of available placeholders: {time}
  cooldown: '{prefix}Please wait {time}, before using the voucher again'
  sent-everyone-voucher: '{prefix}<aqua>You have just given all players a <gold>{voucher}
    <aqua>voucher.'
misc:
  config-reload: '{prefix}<gray>You have just reloaded the configurations.'
  player-only: '{prefix}<red>Only players can use this command.'
  help:
  - <dark_gray>- <gold>/crazyvouchers help <aqua>Lists all the commands for vouchers.
  - <dark_gray>- <gold>/crazyvouchers list <aqua>Lists all available types of vouchers
    and codes.
  - <dark_gray>- <gold>/crazyvouchers redeem <code> <aqua>Allows the player to redeem
    a voucher code.
  - <dark_gray>- <gold>/crazyvouchers give <voucher> [amount] [player] [arguments]
    <aqua>Gives a player a voucher.
  - <dark_gray>- <gold>/crazyvouchers giveall <voucher> [amount] [arguments] <aqua>Gives
    all players a voucher.
  - <dark_gray>- <gold>/crazyvouchers open [page] <aqua>Opens a GUI so you can get
    vouchers easily.
  - <dark_gray>- <gold>/crazyvouchers migrate -mt [type] <aqua>Runs multiple migration
    types to make migrating easier.
  - <dark_gray>- <gold>/crazyvouchers reload <aqua>Reloaded the configuration files.
  # A list of available placeholders: {command}
  unknown-command: '{prefix}<red>{command} is not a known command.'
  # A list of available placeholders: {usage}
  correct-usage: '{prefix}<red>The correct usage for this command is <yellow>{usage}'
  feature-disabled: '{prefix}<red>This feature is disabled.'
  must-be-console-sender: '{prefix}<red>You must be using console to use this command.'
  target-same-player: '{prefix}<red>You cannot use this command on yourself.'
  inventory-not-empty: '{prefix}<red>Inventory is not empty, Please clear up some
    room.'
  # A list of available placeholders: {flag}, {usage}
  lacking-flag: '{prefix}<red>{flag} is not present in the command, expected format:
    {usage}'
  # The format for the /crazyvouchers list command
  # 
  # A list of available placeholders
  #  ⤷ {total_vouchers} » Shows the total vouchers count
  #  ⤷ {total_codes} » Shows the total codes count
  #  ⤷ {active_vouchers} » Shows the active vouchers count
  #  ⤷ {active_codes} » Shows the active codes count
  #  ⤷ {broken_vouchers} » Shows the broken vouchers count
  #  ⤷ {broken_codes} » Shows the broken codes count
  #  ⤷ {vouchers} » Shows all vouchers broken and not broken
  #  ⤷ {codes} » Shows all codes broken and not broken
  # 
  vouchers-list:
  - <bold><gold>━━━━━━━━━━━━━━━━━━━ Plugin Stats ━━━━━━━━━━━━━━━━━━━</gold></bold>
  - <dark_gray>»</dark_gray> <gold>Code Statistics <dark_gray>[</dark_gray><green>{active_codes}</green><dark_gray>/</dark_gray><gold>{total_codes}</gold><dark_gray>]</dark_gray>
  - <dark_gray>-</dark_gray> {codes}
  - <dark_gray>»</dark_gray> <gold>Voucher Statistics <dark_gray>[</dark_gray><green>{active_vouchers}</green><dark_gray>/</dark_gray><gold>{total_vouchers}</gold><dark_gray>]</dark_gray>
  - <dark_gray>-</dark_gray> {vouchers}
  - <bold><gold>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gold></bold>
command:
  migrate:
    # A list of available placeholders: {file}, {type}, {reason}
    error: '{prefix}<red>We could not migrate <green>{file} <red>using <green>{type}
      <red>migration for <green>{reason}.'
    # A list of available placeholders: {prefix}
    not-available: '{prefix}<green>This migration type is not available.'
    # A list of available placeholders: {name}
    plugin-not-available: '{prefix}<green>The plugin <red>{name} <green>is not enabled.
      Cannot use as migration!'
    no-vouchers-available: '{prefix}<green>There is no vouchers available for migration!'
    no-codes-available: '{prefix}<green>There is no codes available for migration!'
    success-users:
    - <bold><gold>━━━━━━━━━━━━━━━━━━━ Migration Stats ━━━━━━━━━━━━━━━━━━━</gold></bold>
    - '<dark_gray>»</dark_gray> <green>Successful Conversions: '
    - ' ⤷ {succeeded_amount}</green>'
    - '<dark_gray>»</dark_gray> <red>Failed Conversions: '
    - ' ⤷ {failed_amount}</red>'
    - ''
    - '<red>Conversion Time: <yellow>{time}'
    - '<red>Conversion Type: <yellow>{type}'
    - ''
    - <bold><gold>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gold></bold>
    # A list of available placeholders: {type}, {files}
    # 
    # {files} will output multiple vouchers if migrating from another plugin
    success:
    - <bold><gold>━━━━━━━━━━━━━━━━━━━ Migration Stats ━━━━━━━━━━━━━━━━━━━</gold></bold>
    - '<dark_gray>»</dark_gray> <green>Successful Conversions: '
    - ' ⤷ {succeeded_amount}</green>'
    - '<dark_gray>»</dark_gray> <red>Failed Conversions: '
    - ' ⤷ {failed_amount}</red>'
    - ''
    - '<red>Conversion Time: <yellow>{time}'
    - '<red>Conversion Type: <yellow>{type}'
    - ''
    - '<red>Converted Files:'
    - '{files}'
    - ''
    - <bold><gold>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gold></bold>
